<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>英语句子过关训练系统</title>
    <!-- 引入 Supabase 云端通信库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* =========================================================
           🎨 1. 设计令牌 (Design Tokens) - 全局变量与配色系统
           ========================================================= */
        :root {
            /* 主色调 - 靛蓝紫渐变系 */
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --primary-light: #818CF8;
            --primary-bg: #EEF2FF;
            --accent: #06B6D4;
            --accent-2: #8B5CF6;

            /* 中性色 */
            --bg: #F8FAFC;
            --bg-gradient-1: #EEF2FF;
            --bg-gradient-2: #FCE7F3;
            --bg-gradient-3: #E0F2FE;
            --card-bg: #FFFFFF;
            --card-glass: rgba(255, 255, 255, 0.85);

            /* 文字 */
            --text-main: #1F2937;
            --text-light: #6B7280;
            --text-on-primary: #FFFFFF;

            /* 状态色 */
            --success: #10B981;
            --success-bg: #D1FAE5;
            --error: #EF4444;
            --error-bg: #FEE2E2;
            --warning: #F59E0B;
            --warning-bg: #FEF3C7;
            --border: #E5E7EB;
            --border-light: #F1F5F9;

            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(79, 70, 229, 0.08);
            --shadow-lg: 0 10px 30px rgba(79, 70, 229, 0.12);
            --shadow-xl: 0 20px 50px rgba(79, 70, 229, 0.18);

            /* 圆角 */
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --r-full: 999px;

            /* 间距 */
            --sp-1: 4px;
            --sp-2: 8px;
            --sp-3: 12px;
            --sp-4: 16px;
            --sp-5: 20px;
            --sp-6: 24px;
            --sp-8: 32px;

            /* 字体 */
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                'Hiragino Sans GB', 'Microsoft YaHei', Tahoma, Geneva, Verdana, sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', Monaco, monospace;

            /* 动效 */
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --dur-fast: 0.15s;
            --dur-base: 0.25s;
            --dur-slow: 0.4s;
        }

        /* =========================================================
           🌐 2. 全局基础样式
           ========================================================= */
        *, *::before, *::after { box-sizing: border-box; }

        html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, var(--bg-gradient-1) 0%, transparent 50%),
                radial-gradient(at 100% 0%, var(--bg-gradient-2) 0%, transparent 50%),
                radial-gradient(at 50% 100%, var(--bg-gradient-3) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: var(--sp-5);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 var(--sp-2);
            position: relative;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            margin: 0 0 var(--sp-2) 0;
            font-size: clamp(1.6em, 5vw, 2.4em);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: var(--sp-6);
            font-size: 0.95em;
            font-weight: 500;
            padding: var(--sp-2) var(--sp-4);
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--r-full);
            display: inline-block;
            border: 1px solid var(--border);
        }
        .subtitle { display: block; width: fit-content; margin-left: auto; margin-right: auto; }

        /* =========================================================
           🏷️ 3. 标签页 (Tabs) - 玻璃拟态 + 滑动指示
           ========================================================= */
        .tabs {
            display: flex;
            justify-content: center;
            gap: var(--sp-2);
            margin-bottom: var(--sp-6);
            flex-wrap: wrap;
            padding: var(--sp-2);
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--r-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn {
            padding: var(--sp-2) var(--sp-4);
            border: none;
            border-radius: var(--r-md);
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all var(--dur-base) var(--ease);
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            min-height: 38px;
        }
        .tab-btn:hover { background: var(--primary-bg); color: var(--primary); }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
            color: var(--text-on-primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
            transform: translateY(-1px);
        }
        .tab-btn:active { transform: translateY(0) scale(0.98); }

        /* =========================================================
           📦 4. 卡片容器
           ========================================================= */
        .card {
            background: var(--card-bg);
            padding: clamp(16px, 4vw, 32px);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-lg);
            margin-bottom: var(--sp-5);
            min-height: 300px;
            border: 1px solid var(--border-light);
            animation: fadeInUp var(--dur-slow) var(--ease);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================================
           ❓ 5. 题目块
           ========================================================= */
        .question-block {
            margin-bottom: var(--sp-6);
            padding-bottom: var(--sp-5);
            border-bottom: 1px dashed var(--border);
        }
        .question-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .cn-text {
            font-size: clamp(1em, 2.5vw, 1.2em);
            font-weight: 700;
            margin-bottom: var(--sp-3);
            color: #111827;
            line-height: 1.5;
        }

        /* =========================================================
           📝 6. 表单元素
           ========================================================= */
        textarea, input[type="text"], input[type="number"], select {
            width: 100%;
            padding: var(--sp-3) var(--sp-4);
            border: 2px solid var(--border);
            border-radius: var(--r-md);
            font-size: 16px;  /* 防止 iOS 自动放大 */
            font-family: inherit;
            margin-bottom: var(--sp-3);
            outline: none;
            transition: all var(--dur-base) var(--ease);
            background: var(--card-bg);
            color: var(--text-main);
        }
        textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
        textarea:focus, input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        input.blank-input {
            min-width: 60px;
            max-width: 100%;
            display: inline-block;
            margin: 0 var(--sp-1);
            text-align: center;
            border-bottom: 2px solid var(--primary);
            border-top: none;
            border-left: none;
            border-right: none;
            border-radius: 0;
            padding: var(--sp-1) var(--sp-2);
            background: transparent;
            font-weight: 600;
            color: var(--primary);
            width: auto;
        }
        input.blank-input:focus {
            background: var(--primary-bg);
            box-shadow: none;
        }

        /* =========================================================
           🔘 7. 按钮系统
           ========================================================= */
        button.action-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: var(--text-on-primary);
            border: none;
            padding: var(--sp-2) var(--sp-5);
            border-radius: var(--r-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95em;
            transition: all var(--dur-base) var(--ease);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
            -webkit-user-select: none;
            user-select: none;
            min-height: 40px;
        }
        button.action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }
        button.action-btn:active { transform: translateY(0) scale(0.98); }
        button.action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* =========================================================
           💬 8. 反馈与提示
           ========================================================= */
        .feedback {
            margin-top: var(--sp-3);
            font-weight: 600;
            font-size: 1em;
            padding: var(--sp-2) var(--sp-3);
            border-radius: var(--r-sm);
            animation: slideIn var(--dur-base) var(--ease);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .correct { color: var(--success); background: var(--success-bg); padding: var(--sp-1) var(--sp-2); border-radius: var(--r-sm); }
        .wrong { color: var(--error); background: var(--error-bg); padding: var(--sp-1) var(--sp-2); border-radius: var(--r-sm); }

        .hint-text {
            color: var(--text-main);
            font-size: 0.95em;
            background: linear-gradient(135deg, #EEF2FF, #DBEAFE);
            padding: var(--sp-3) var(--sp-4);
            border-radius: var(--r-md);
            border-left: 4px solid var(--primary);
            margin-bottom: var(--sp-5);
            line-height: 1.7;
        }
        .hint-text strong { color: var(--primary); }

        /* =========================================================
           🎴 9. 单词挖空样式
           ========================================================= */
        .recitation-word {
            display: inline-block;
            margin-right: 4px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--dur-fast) var(--ease);
            padding: 1px 2px;
            border-radius: 3px;
        }
        .recitation-word:hover { color: var(--primary); background: var(--primary-bg); }
        .recitation-word.masked { border-bottom: 2px dashed #9CA3AF; letter-spacing: 1px; }
        .recitation-word.revealed {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
            background: var(--primary-bg);
        }

        /* =========================================================
           ✍️ 10. 富文本编辑器
           ========================================================= */
        #rich-editor {
            background: #FFFFFF;
            min-height: 150px;
            border-radius: var(--r-md);
            padding: var(--sp-4);
            border: 2px dashed #9CA3AF;
            font-size: 1.05em;
            line-height: 1.8;
            overflow-y: auto;
            margin-bottom: var(--sp-4);
            outline: none;
            transition: border-color var(--dur-base) var(--ease);
        }
        #rich-editor:focus { border-color: var(--primary); border-style: solid; }
        #rich-editor:empty:before {
            content: attr(placeholder);
            color: #9CA3AF;
            pointer-events: none;
        }

        /* =========================================================
           📊 11. 表格
           ========================================================= */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--sp-3);
            font-size: 0.9em;
            background: #FFF;
            border-radius: var(--r-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .data-table th, .data-table td {
            border-bottom: 1px solid var(--border);
            padding: var(--sp-3);
            text-align: left;
            word-break: break-word;
        }
        .data-table th {
            background: linear-gradient(135deg, #F8FAFC, #F1F5F9);
            font-weight: 700;
            color: #374151;
            font-size: 0.9em;
        }
        .data-table tbody tr { transition: background var(--dur-fast) var(--ease); }
        .data-table tbody tr:hover { background: #FAFAFA; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: var(--sp-2);
            margin-top: var(--sp-4);
            align-items: center;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: var(--sp-2) var(--sp-3);
            border: 1px solid var(--border);
            background: #FFF;
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 0.9em;
            transition: all var(--dur-fast) var(--ease);
        }
        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #FFF;
            border-color: var(--primary);
        }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* =========================================================
           ⏱️ 12. 倒计时动画
           ========================================================= */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; color: #DC2626; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-warning { animation: pulse 1s infinite; color: #DC2626 !important; }

        /* =========================================================
           🎉 13. 彩带特效
           ========================================================= */
        #confetti-container {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
            display: none;
        }
        .confetti-piece {
            position: absolute;
            font-size: 2em;
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* =========================================================
           📱 14. 响应式断点 - 平板 (641px - 1024px)
           ========================================================= */
        @media (max-width: 1024px) {
            .container { max-width: 100%; }
            body { padding: var(--sp-4); }
        }

        /* =========================================================
           📱 15. 响应式断点 - 手机 (≤640px)
           ========================================================= */
        @media (max-width: 640px) {
            body {
                padding: var(--sp-2);
                line-height: 1.55;
            }

            .container { padding: 0; }

            h1 { font-size: 1.5em; margin-bottom: var(--sp-1); }
            .subtitle { font-size: 0.85em; padding: 6px 12px; margin-bottom: var(--sp-4); }

            /* 标签页：横向滚动 */
            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                justify-content: flex-start;
                padding: var(--sp-2);
                gap: 6px;
                border-radius: var(--r-md);
            }
            .tabs::-webkit-scrollbar { display: none; }
            .tab-btn {
                padding: 8px 14px;
                font-size: 0.85em;
                flex-shrink: 0;
                min-height: 36px;
            }

            .card {
                padding: var(--sp-4);
                border-radius: var(--r-md);
                min-height: 250px;
            }

            .question-block {
                margin-bottom: var(--sp-4);
                padding-bottom: var(--sp-3);
            }

            .cn-text { font-size: 1em; margin-bottom: var(--sp-2); }

            /* 表单元素：移动端全宽 */
            textarea, input[type="text"], input[type="number"], select {
                padding: 10px 12px;
                font-size: 16px;  /* 关键：iOS 不自动缩放 */
            }

            input.blank-input {
                min-width: 50px;
                font-size: 14px;
                padding: 2px 4px;
            }

            /* 按钮：移动端全宽更易点 */
            button.action-btn {
                padding: 10px 16px;
                font-size: 0.95em;
                min-height: 42px;
            }

            /* 富文本编辑器 */
            #rich-editor {
                font-size: 1em;
                padding: var(--sp-3);
                min-height: 120px;
            }

            /* 表格：横向滚动 */
            .data-table { font-size: 0.85em; }
            .data-table th, .data-table td { padding: 8px 6px; }

            /* 闯关模式：紧凑布局 */
            .challenge-header { flex-direction: column; gap: var(--sp-2); align-items: stretch !important; text-align: center; }
            .challenge-header > div { text-align: center; }
            #ch-timer-display { font-size: 1.6em !important; }

            /* 倒计时：稍小一点 */
            .timer-display-mobile { font-size: 1.5em !important; }
        }

        /* =========================================================
           📱 16. 超小屏 (≤380px) - iPhone SE 等
           ========================================================= */
        @media (max-width: 380px) {
            h1 { font-size: 1.3em; }
            .tab-btn { padding: 6px 10px; font-size: 0.8em; }
            .card { padding: 12px; }
        }

        /* =========================================================
           🖨️ 17. 打印样式
           ========================================================= */
        @media print {
            body { background: white; padding: 0; }
            .tabs, button, #confetti-container { display: none !important; }
            .card { box-shadow: none; border: 1px solid #ccc; }
        }

        /* =========================================================
           ♿ 18. 无障碍 & 偏好
           ========================================================= */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: var(--r-full); }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* 选中文本高亮 */
        ::selection { background: var(--primary); color: white; }
        ::-moz-selection { background: var(--primary); color: white; }

        /* =========================================================
           🔧 19. "更多工具"按钮 & 工具面板（右上角，随页面滚动）
           ========================================================= */
        #more-tools-btn {
            position: absolute;
            top: 0;
            right: var(--sp-2);
            z-index: 9000;
            background: linear-gradient(135deg, var(--primary), var(--accent-2));
            color: #ffffff;
            border: none;
            padding: var(--sp-2) var(--sp-4);
            border-radius: var(--r-md);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
            transition: all var(--dur-base) var(--ease);
            -webkit-user-select: none;
            user-select: none;
            white-space: nowrap;
            min-height: 38px;
        }
        #more-tools-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }
        #more-tools-btn:active { transform: translateY(0) scale(0.97); }

        #more-tools-btn .mt-arrow {
            display: inline-block;
            margin-left: 6px;
            transition: transform var(--dur-base) var(--ease);
        }
        #more-tools-btn.open .mt-arrow { transform: rotate(180deg); }

        #more-tools-panel {
            position: absolute;
            top: 42px;
            right: var(--sp-2);
            z-index: 9000;
            background: var(--card-bg);
            padding: 20px 20px 16px 20px;
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border);
            display: none;
            min-width: 240px;
            max-width: 320px;
            animation: fadeInUp var(--dur-base) var(--ease);
        }
        #more-tools-panel.show { display: block; }

        #more-tools-panel .mtp-title {
            font-size: 0.85em;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #more-tools-panel .mtp-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        #more-tools-panel .tool-link {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            margin: 4px 0;
            font-size: 0.9em;
            font-weight: 600;
            transition: background-color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
            width: 100%;
            text-align: left;
        }
        #more-tools-panel .tool-link:hover {
            background-color: #1d4ed8;
            transform: translateX(4px);
        }

        /* 版权信息 */
        .copyright {
            text-align: center;
            color: var(--text-light);
            font-size: 0.8em;
            padding: 20px 0 60px 0;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- 满分全屏特效容器 -->
<div id="confetti-container"></div>

<div class="container">
    <!-- 右上角"更多工具"按钮 -->
    <button id="more-tools-btn" onclick="toggleMoreTools()">
        🧰 更多工具 <span class="mt-arrow">▼</span>
    </button>

    <!-- 更多工具面板 -->
    <div id="more-tools-panel">
        <div class="mtp-title">教学工具集</div>
        <div class="mtp-links">
            <a class="tool-link" href="public/countdown.html" target="_blank">⏰ countdown</a>

    function getBaseForm(word) {
        let w = word.toLowerCase();
        if (baseWords.has(w)) return w;
        w = w.replace(/'s$/, '').replace(/'$/, '');
        if (irregulars[w]) return irregulars[w];
        if (baseWords.has(w)) return w; 
        let changed = true;
        while(changed) {
            changed = false; let temp = w;
            if (temp.endsWith('ily') && temp.length > 5) temp = temp.slice(0, -3) + 'y';
            else if (temp.endsWith('ally') && temp.length > 6) temp = temp.slice(0, -4);
            else if (temp.endsWith('ly') && temp.length > 4 && !temp.endsWith('ply')) temp = temp.slice(0, -2);
            else if (temp.endsWith('iness') && temp.length > 6) temp = temp.slice(0, -5) + 'y';
            else if (temp.endsWith('ness') && temp.length > 5) temp = temp.slice(0, -4);
            else if (temp.endsWith('ment') && temp.length > 5) temp = temp.slice(0, -4);
            else if (temp.endsWith('ity') && temp.length > 5) temp = temp.endsWith('ability') && temp.length > 7 ? temp.slice(0, -5) + 'le' : temp.slice(0, -3);
            else if (temp.endsWith('ful') && temp.length > 5) temp = temp.slice(0, -3);
            else if (temp.endsWith('less') && temp.length > 6) temp = temp.slice(0, -4);
            if (temp !== w) { w = temp; changed = true; if (irregulars[w]) return irregulars[w]; if (baseWords.has(w)) return w; }
        }
        if (w.endsWith('iest') && w.length > 5) return w.slice(0, -4) + 'y'; 
        if (w.endsWith('ier') && w.length > 4) return w.slice(0, -3) + 'y';   
        if (w.match(/([^aeiou])\1est$/)) return w.slice(0, -4); 
        if (w.match(/([^aeiou])\1er$/)) return w.slice(0, -3);  
        if (w.endsWith('est') && w.length > 4) return w.slice(0, -3);
        if (w.endsWith('er') && w.length > 4) return w.slice(0, -2);
        if (w.endsWith('ies') && w.length > 4) return w.slice(0, -3) + 'y'; 
        if (w.endsWith('es') && w.match(/(s|sh|ch|x|z)es$/)) w = w.slice(0, -2); 
        else if (w.endsWith('s') && w.length > 3 && !w.endsWith('ss') && !w.endsWith('us') && !w.endsWith('is')) w = w.slice(0, -1); 
        if (irregulars[w]) return irregulars[w];
        if (baseWords.has(w)) return w;
        if (w.endsWith('ing')) {
            if (w.match(/ving$/) || w.match(/cing$/)) return w.slice(0, -3) + 'e'; 
            if (w.match(/([^aeiou])\1ing$/)) return w.slice(0, -4); 
            if (w.match(/[aeiou][^aeiou]ing$/) && !w.match(/(y|w|x)ing$/)) return w.slice(0, -3) + 'e'; 
            return w.slice(0, -3); 
        }
        if (w.endsWith('ed')) {
            if (w.match(/([^aeiou])\1ed$/)) return w.slice(0, -3); 
            if (w.match(/[aeiou][^aeiou]ed$/) && !w.match(/(y|w|x)ed$/)) return w.slice(0, -1); 
            return w.slice(0, -2); 
        }
        if (w.endsWith('ation') && w.length > 6) return w.slice(0, -5) + 'ate'; 
        return w; 
    }

    function getPhraseBaseForm(phrase) {
        const words = phrase.split(/\s+/);
        let resultWords = [], hasNot = false;
        for (let word of words) {
            let cleanW = word.toLowerCase().replace(/[^a-z']/g, '');
            if (!cleanW) continue;
            if (cleanW === 'not' || cleanW.endsWith("n't")) { hasNot = true; continue; }
            if (auxVerbs.has(cleanW)) continue; 
            resultWords.push(getBaseForm(cleanW));
        }
        if (resultWords.length === 0 && words.length > 0) {
             let lastWord = words[words.length - 1].toLowerCase().replace(/[^a-z']/g, '');
             if(lastWord.endsWith("n't")) lastWord = lastWord.slice(0,-3);
             resultWords.push(getBaseForm(lastWord)); 
        }
        let basePhrase = resultWords.join(' ');
        if (hasNot) basePhrase = 'not ' + basePhrase; 
        return basePhrase;
    }

    // --- 中译英 ---
    function renderTranslate(dataToRender = database, isTest = false) {
        let html = isTest ? '' : '<div class="hint-text"><strong>🎯 中译英：</strong> 根据中文提示写出完整英文句子。</div>';
        dataToRender.forEach((item, index) => {
            html += `

                    <div class="cn-text">${index + 1}. ${escapeHtml(item.cn)}</div>
                    <textarea id="trans-input-${item.id}" rows="2" placeholder="在此输入英文..."></textarea>
                    ${isTest ? '' : `<button class="action-btn" onclick="checkTranslation(${item.id})">核对答案</button>`}
                    <div id="trans-feedback-${item.id}" class="feedback"></div>
                </div>`;
        });
        if (!isTest) document.getElementById('app-content').innerHTML = html;
        return html;
    }

    function checkTranslation(id) {
        const item = database.find(d => d.id === id);
        const input = document.getElementById(`trans-input-${id}`).value.trim();
        const feedbackDiv = document.getElementById(`trans-feedback-${id}`);
        const normalize = (s) => s.toLowerCase().replace(/[.,!?]$/, '').replace(/['’]/g, "'").replace(/\s+/g, " ").trim();
        if (normalize(input) === normalize(item.en)) {
            feedbackDiv.innerHTML = '<span class="correct">✅ 回答正确！</span>'; removeMistake(id);
        } else {
            feedbackDiv.innerHTML = `<span class="wrong">❌ 有误。正确答案：${escapeHtml(item.en)}</span>`; addMistake(id);
        }
    }

    // --- 词形填空 ---
    function renderFill(dataToRender = database, isTest = false) {
        let html = isTest ? '' : '<div class="hint-text"><strong>🎯 词形填空：</strong> 根据括号内的原形/提示，填入正确形式。</div>';
        dataToRender.forEach((item, index) => {
            let fillText = item.fill.replace(/\{([^}]+)\}(?:\s*\(([^)]+)\))?/g, (m, ans, hint) => {
                let placeholderText = hint ? `(${hint})` : ' ';
                let chLength = Math.max(ans.length, placeholderText.length) + 4; 
                return `<input type="text" class="blank-input" data-ans="${escapeHtml(ans)}" placeholder="${escapeHtml(placeholderText)}" style="width: ${chLength}ch;" autocomplete="off">`;
            });
            html += `<div class="question-block" data-id="${item.id}"><div class="cn-text">${index+1}. ${escapeHtml(item.cn)}</div><div style="font-size:1.25em; line-height:2.2;">${fillText}</div>${isTest ? '' : `<button class="action-btn" style="margin-top:15px;" onclick="checkFill(this, ${item.id})">核对答案</button>`}<div class="feedback"></div></div>`;
        });
        if (!isTest) document.getElementById('app-content').innerHTML = html;
        return html;
    }

    function checkFill(btn, id) {
        const block = btn.parentElement;
        const inputs = block.querySelectorAll('.blank-input');
        const feedback = block.querySelector('.feedback');
        let correctArr = []; let ok = true;
        inputs.forEach(i => {
            const ans = i.dataset.ans.trim(); correctArr.push(ans);
            if(i.value.trim().toLowerCase() === ans.toLowerCase()) { i.style.borderBottomColor = "var(--success)"; i.style.color = "var(--success)"; } 
            else { i.style.borderBottomColor = "var(--error)"; i.style.color = "var(--error)"; ok = false; }
        });
        if (ok) { feedback.innerHTML = '<span class="correct">✅ 全部正确</span>'; if(id) removeMistake(id); } 
        else { feedback.innerHTML = `<span class="wrong">❌ 有错，正确答案: <span style="color:#059669">${escapeHtml(correctArr.join(' / '))}</span></span>`; if(id) addMistake(id); }
    }

        database.forEach((item, index) => {
            let processedEn = item.en.replace(/[a-zA-Z]+/g, match => {
                if (currentReciteLevel === 0) {
                    let maskedData = '_'.repeat(match.length);
                    return `<span class="recitation-word" data-full="${escapeHtml(match)}" data-masked="${escapeHtml(maskedData)}" onclick="toggleWord(this)">${escapeHtml(match)}</span>`;
                } else {
                    let display = currentReciteLevel === 1 ? match[0] + '_'.repeat(match.length - 1) : '_'.repeat(match.length);
                    return `<span class="recitation-word masked" data-full="${escapeHtml(match)}" data-masked="${escapeHtml(display)}" onclick="toggleWord(this)">${escapeHtml(display)}</span>`;
                }
            });
            
            let btnHtml = '';
            if (currentReciteLevel > 0) {
                btnHtml = `<button class="action-btn" style="padding:4px 10px; font-size:0.8em; margin-left:15px; background:#6B7280; border-radius:6px;" onclick="toggleSentenceAnswers(this)">显示答案</button>`;
            }

            html += `<div class="question-block">
                        <div class="cn-text" style="display:flex; align-items:center;">
                            <span>${index+1}. ${escapeHtml(item.cn)}</span>
                            ${btnHtml}
                        </div>
                        <div style="font-size:1.3em; line-height:1.8; user-select:none;">${processedEn}</div>
                     </div>`;
        });
        document.getElementById('recite-list').innerHTML = html;
    }

    function toggleWord(el) {
        if (el.innerText === el.dataset.masked) {
            el.innerText = el.dataset.full;
            el.classList.remove('masked');
            el.classList.add('revealed');
        } else {
            el.innerText = el.dataset.masked;
            el.classList.remove('revealed');
            el.classList.add('masked');
        }
    }

    function toggleSentenceAnswers(btn) {
        const container = btn.parentElement.nextElementSibling;
        const words = container.querySelectorAll('.recitation-word');
        let isShowing = btn.innerText === '隐藏答案';
        words.forEach(el => {
            if (isShowing) {
                el.innerText = el.dataset.masked;
                el.classList.remove('revealed');
                el.classList.add('masked');
            } else {
                el.innerText = el.dataset.full;
                el.classList.remove('masked');
                el.classList.add('revealed');
            }
        });
        btn.innerText = isShowing ? '显示答案' : '隐藏答案';
        btn.style.background = isShowing ? '#6B7280' : 'var(--primary)';
    }

    /* ================= 4. 🏆 单题倒计时极限闯关 ================= */
    let chData = [];
    let chIndex = 0;
    let chTimePerQuestion = 0;
    let chTimeLeft = 0;
    let chTimer = null;
    let chResults = [];
    let chTestType = 'mix';

    function renderChallengeSettings() {
        let html = `
            <div class="hint-text" style="background:#FFFBEB; border-color:#F59E0B;"><strong>🏆 极限闯关模式：</strong> 每次仅显示一题，限时作答。全对将触发隐藏彩蛋特效！</div>
            <div style="background: #FFF; padding: 30px; border-radius: 12px; border: 2px solid #FDE68A; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: bold; font-size:1.1em; display:inline-block; width:120px; text-align:right; margin-right:10px;">出题题型：</label>
                    <select id="ch-type" style="width: 130px;">
                        <option value="mix">随机混合</option>
                        <option value="trans">仅中译英</option>
                        <option value="fill">仅词形填空</option>
                    </select>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="font-weight: bold; font-size:1.1em; display:inline-block; width:120px; text-align:right; margin-right:10px;">挑战题数：</label>
                    <input type="number" id="ch-count" value="${Math.min(10, database.length)}" min="1" max="${database.length}" style="width: 130px; text-align: center;">
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="font-weight: bold; font-size:1.1em; display:inline-block; width:120px; text-align:right; margin-right:10px;">单题限时：</label>
                    <select id="ch-time" style="width: 130px;">
                        <option value="10">10 秒</option>
                        <option value="15" selected>15 秒</option>
                        <option value="20">20 秒</option>
                        <option value="25">25 秒</option>
                    </select>
                </div>
                <button class="action-btn" style="width: 250px; padding: 15px; font-size: 1.3em; background:linear-gradient(135deg, #F59E0B, #DC2626); box-shadow: 0 4px 10px rgba(220, 38, 38, 0.3);" onclick="startChallenge()">⚔️ 立即开始挑战</button>
            </div>
        `;
        document.getElementById('app-content').innerHTML = html;
    }

    function startChallenge() {
        const count = parseInt(document.getElementById('ch-count').value);
        chTimePerQuestion = parseInt(document.getElementById('ch-time').value);
        chTestType = document.getElementById('ch-type').value;
        if (isNaN(count) || count < 1 || count > database.length) { alert("请输入有效数量！"); return; }
        
        chData = fisherYates([...database]).slice(0, count);
        chIndex = 0; chResults = [];
        renderChallengeQuestion();
    }

    function renderChallengeQuestion() {
        if (chIndex >= chData.length) { finishChallenge(); return; }
        
        const item = chData[chIndex];
        const isTrans = chTestType === 'trans' ? true : (chTestType === 'fill' ? false : Math.random() > 0.5);
        chTimeLeft = chTimePerQuestion;

        let html = `
            <div class="challenge-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px; padding-bottom:15px; border-bottom:2px solid var(--border); gap: var(--sp-3);">
                <div style="font-size:clamp(1em, 2.5vw, 1.2em); font-weight:bold; color:var(--text-light);">挑战进度：<span style="color:var(--primary); font-size:1.2em;">${chIndex + 1} / ${chData.length}</span></div>
                <div id="ch-timer-display" style="font-size:clamp(1.5em, 5vw, 2em); font-weight:900; color:var(--primary); font-variant-numeric: tabular-nums;">⏳ ${chTimeLeft}s</div>
            </div>
            <div id="ch-question-area" style="min-height: 180px;" data-type="${isTrans ? 'trans' : 'fill'}">
                <div style="display:inline-block; padding:4px 12px; background:var(--primary); color:white; border-radius:4px; font-size:0.9em; font-weight:bold; margin-bottom:15px;">${isTrans ? '中译英' : '词形填空'}</div>
                ${isTrans ? renderTranslate([item], true) : renderFill([item], true)}
            </div>
            <button class="action-btn" id="ch-submit-btn" style="width:100%; margin-top:30px; padding:15px; font-size:1.3em; background:#2563EB;" onclick="submitChallengeAnswer(false)">提交答案</button>
            <div id="ch-feedback-area" style="margin-top:20px; text-align:center; min-height:80px;"></div>
        `;
        document.getElementById('app-content').innerHTML = html;

        clearInterval(chTimer);
        chTimer = setInterval(() => {
            chTimeLeft--;
            const timerEl = document.getElementById('ch-timer-display');
            timerEl.innerText = `⏳ ${chTimeLeft}s`;
            if (chTimeLeft <= Math.min(5, chTimePerQuestion * 0.3)) timerEl.classList.add('timer-warning');
            
            if (chTimeLeft <= 0) {
                clearInterval(chTimer);
                timerEl.innerText = `⏳ 0s`;
                submitChallengeAnswer(true);
            }
        }, 1000);
    }

    function submitChallengeAnswer(isTimeout) {
        clearInterval(chTimer);
        const item = chData[chIndex];
        const qArea = document.getElementById('ch-question-area');
        const type = qArea.dataset.type;
        const timeUsed = chTimePerQuestion - chTimeLeft;
        let isCorrect = true;

        if (type === 'trans') {
            const val = qArea.querySelector('textarea').value.trim();
            const normalize = (s) => s.toLowerCase().replace(/[.,!?]$/, '').replace(/['’]/g, "'").replace(/\s+/g, " ").trim();
            if (normalize(val) !== normalize(item.en)) isCorrect = false;
        } else {
            const ins = qArea.querySelectorAll('.blank-input');
            ins.forEach(i => { if(i.value.trim().toLowerCase() !== i.dataset.ans.toLowerCase()) isCorrect = false; });
        }

        let evaluation = "";
        if (isCorrect) {
            const ratio = timeUsed / chTimePerQuestion;
            if (ratio <= 0.25) evaluation = "🌟 Excellent";
            else if (ratio <= 0.5) evaluation = "👍 Good";
            else if (ratio <= 0.75) evaluation = "👌 Fair";
            else evaluation = "💪 Keep fighting";
            removeMistake(item.id);
        } else {
            evaluation = "❌ 答错啦";
            addMistake(item.id);
        }

        chResults.push({ correct: isCorrect, timeUsed });

        const btn = document.getElementById('ch-submit-btn');
        btn.innerText = chIndex === chData.length - 1 ? "查看最终成绩" : "进入下一题 ➡️";
        btn.onclick = () => { chIndex++; renderChallengeQuestion(); };
        btn.style.background = isCorrect ? "var(--success)" : "var(--error)";

        const fb = document.getElementById('ch-feedback-area');
        if (isCorrect) {
            fb.innerHTML = `<h2 class="correct" style="margin-bottom:5px;">✅ 回答正确！</h2><div style="font-size:1.3em; color:#D97706; font-weight:bold;">耗时 ${timeUsed}s — ${evaluation}</div>`;
        } else {
            const ansStr = type === 'trans' ? item.en : Array.from(qArea.querySelectorAll('.blank-input')).map(i => i.dataset.ans).join(', ');
            fb.innerHTML = `<h2 class="wrong" style="margin-bottom:5px;">${isTimeout ? "⏰ 超时未完成" : "❌ 存在错误"}</h2><div class="correct" style="font-size:1.2em;">正确答案: ${escapeHtml(ansStr)}</div>`;
        }
    }

    function finishChallenge() {
        const correctCount = chResults.filter(r => r.correct).length;
        const total = chResults.length;
        const isPerfect = correctCount === total && total > 0;
        
        let avgTime = total > 0 ? Math.round(chResults.reduce((sum, r) => sum + r.timeUsed, 0) / total) : 0;

        let html = `
            <div style="text-align:center; padding:30px 0;">
                <h1 style="font-size:3em; margin-bottom:10px; color:${isPerfect ? 'var(--success)' : 'var(--primary)'}">${isPerfect ? '🏆 完美通关！' : '🎯 挑战结束'}</h1>
                <div style="font-size:1.5em; margin-bottom: 20px;">最终得分：<strong>${Math.round(correctCount/total*100)}</strong> 分</div>
                <div style="display:flex; justify-content:center; gap:30px; margin-bottom:40px; font-size:1.2em; color:var(--text-light);">
                    <div>✅ 答对: <span style="color:var(--success); font-weight:bold;">${correctCount}</span> 题</div>
                    <div>❌ 答错: <span style="color:var(--error); font-weight:bold;">${total - correctCount}</span> 题</div>
                    <div>⏱️ 平均耗时: <span style="color:var(--primary); font-weight:bold;">${avgTime}s</span> /题</div>
                </div>
                <button class="action-btn" style="padding:15px 40px; font-size:1.2em;" onclick="switchTab('challenge', document.querySelectorAll('.tab-btn')[4])">再战一次</button>
            </div>
        `;
        document.getElementById('app-content').innerHTML = html;

        if (isPerfect) triggerConfetti();
    }

    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        container.innerHTML = ''; container.style.display = 'block';
        const emojis = ['🎉', '🏆', '✨', '🔥', '💯'];
        for(let i = 0; i < 40; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            piece.style.left = Math.random() * 100 + 'vw';
            piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
            piece.style.animationDelay = (Math.random() * 0.5) + 's';
            container.appendChild(piece);
        }
        setTimeout(() => { container.style.display = 'none'; }, 4000);
    }

    /* ================= 5. 统考试卷检测 ================= */
    function renderTestSettings() {
        let html = `
            <div class="hint-text"><strong>🎯 统考卷：</strong> 混合或专项出题，一次性展示多道题，统一交卷。</div>
            <div style="background: #EFF6FF; padding: 25px; border-radius: 12px; border: 1px solid #BFDBFE; text-align: center;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;">
                    <label style="font-weight: bold;">出题题型：</label>

    function generateTest() {
        const count = parseInt(document.getElementById('test-count').value);
        const testType = document.getElementById('test-type').value;
        if (isNaN(count) || count < 1 || count > database.length) { alert(`请输入有效数量 (1 - ${database.length})`); return; }
        const shuffled = fisherYates([...database]).slice(0, count);
        let html = `<h3 style="text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-top: 30px;">📄 模拟统考试卷</h3>`;
        shuffled.forEach((item, index) => {
            let isTrans = testType === 'trans' ? true : (testType === 'fill' ? false : Math.random() > 0.5);
            html += `<div class="test-item-box" data-id="${item.id}" data-type="${isTrans?'trans':'fill'}" style="background:#F9FAFB; padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border);">`;
            html += `<div style="display:inline-block; padding:4px 10px; background:var(--primary); color:white; border-radius:4px; font-size:0.85em; font-weight:bold; margin-bottom:15px;">${isTrans?'笔译题':'填空题'}</div>`;
            html += isTrans ? renderTranslate([item], true) : renderFill([item], true);
            html += `</div>`;
        });
        html += `<button class="action-btn" style="width:100%; padding:15px; font-size:1.2em;" onclick="submitFullTest()">交卷并评分</button><div id="final-score" style="margin-top:25px; text-align:center;"></div>`;
        document.getElementById('test-questions').innerHTML = html;
    }

    function submitFullTest() {
        const items = document.querySelectorAll('.test-item-box'); let score = 0;
        items.forEach(box => {
            const id = parseInt(box.dataset.id); const item = database.find(d => d.id === id);
            if (box.dataset.type === 'trans') {
                const val = box.querySelector('textarea').value.trim();
                const normalize = (s) => s.toLowerCase().replace(/[.,!?]$/, '').replace(/['’]/g, "'").replace(/\s+/g, " ").trim();
                if (normalize(val) === normalize(item.en)) { score++; box.style.borderLeft = "6px solid var(--success)"; removeMistake(id); } 
                else { box.style.borderLeft = "6px solid var(--error)"; box.innerHTML += `<div class="feedback wrong">❌ 正确答案: <span style="color:#059669">${escapeHtml(item.en)}</span></div>`; addMistake(id); }
            } else {
                const ins = box.querySelectorAll('.blank-input'); let allOk = true;
                ins.forEach(i => { 
                    if(i.value.trim().toLowerCase() !== i.dataset.ans.toLowerCase()){ allOk = false; i.style.borderBottomColor = "var(--error)"; i.style.color = "var(--error)"; } 
                    else { i.style.borderBottomColor = "var(--success)"; i.style.color = "var(--success)"; }
                });
                if (allOk) { score++; box.style.borderLeft = "6px solid var(--success)"; removeMistake(id); } 
                else { box.style.borderLeft = "6px solid var(--error)"; const ansStr = Array.from(ins).map(i => i.dataset.ans).join(', '); box.innerHTML += `<div class="feedback wrong">❌ 正确答案: <span style="color:#059669">${escapeHtml(ansStr)}</span></div>`; addMistake(id); }
            }
        });
        const pct = Math.round(score/items.length*100);
        document.getElementById('final-score').innerHTML = `<h2 style="color:${pct >= 80 ? 'var(--success)' : 'var(--error)'}; margin:0; font-size:2em;">得分：${pct} 分</h2><p style="color:var(--text-light);">答对 ${score} / ${items.length} 题</p>`;
    }

    /* ================= 6. 错题本 ================= */
    function renderMistakes() {
        const mData = database.filter(item => mistakes.includes(item.id));
        if (mData.length === 0) { document.getElementById('app-content').innerHTML = `<div style="text-align:center; padding:50px;"><p style="font-size:1.2em; color:var(--success);">🎉 太棒了！您当前没有错题！</p></div>`; return; }
        
        let html = `<div class="hint-text"><strong>📔 错题攻坚：</strong> 再次作答正确后，题目将自动移出错题本。</div>`;
        mData.forEach((item, index) => {
            html += `<div style="background:#FFF0F2; padding:20px; border-radius:12px; margin-bottom:20px; border-left:4px solid var(--error);">`;
            html += renderTranslate([item], true);
            html += `<button class="action-btn" style="margin-top:15px; background:#DC2626;" onclick="checkMistake(${item.id}, this)">再次核对答案</button><div class="feedback" id="mistake-feedback-${item.id}"></div></div>`;
        });
        document.getElementById('app-content').innerHTML = html;
    }
    
    function checkMistake(id, btn) {
        const item = database.find(d => d.id === id);
        const input = btn.parentElement.querySelector('textarea').value.trim();
        const feedbackDiv = document.getElementById(`mistake-feedback-${id}`);
        const normalize = (s) => s.toLowerCase().replace(/[.,!?]$/, '').replace(/['’]/g, "'").replace(/\s+/g, " ").trim();
        if (normalize(input) === normalize(item.en)) {
            feedbackDiv.innerHTML = '<span class="correct">✅ 恭喜！回答正确，已移出错题本。</span>';
            removeMistake(id); setTimeout(() => renderMistakes(), 1500);
        } else {
            feedbackDiv.innerHTML = `<span class="wrong">❌ 依然有误，再接再厉。答案：${escapeHtml(item.en)}</span>`;
        }
    }

    async function setActiveSet(id) {
        appData.activeSetId = id;
        database = appData.sets.find(s => s.id === id).questions;
        await saveToCloud();
        renderManagePanel();
    }

    async function deleteSet(id) {
        if(confirm("🚨 确定删除这个套题及其所有题目吗？操作不可恢复！")) {
            appData.sets = appData.sets.filter(s => s.id !== id);
            if(appData.activeSetId === id) {
                appData.activeSetId = appData.sets[0].id;
                database = appData.sets[0].questions;
            }
            await saveToCloud();
            renderManagePanel();
        }
    }

    async function processRichText(mode) {
        const editor = document.getElementById('rich-editor');
        if(!editor.textContent.trim()) { alert("请先粘贴内容！"); return; }
        const clone = editor.cloneNode(true);
        const uElements = clone.querySelectorAll('u, span[style*="underline"]');
        uElements.forEach(el => { el.textContent = `[[[${el.textContent}]]]`; });
        clone.style.position = 'absolute'; clone.style.left = '-9999px'; document.body.appendChild(clone);
        const rawText = clone.innerText || clone.textContent; document.body.removeChild(clone);

        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let currentCn = '', newItems = [];
        let startId = Date.now() * 1000; 
        
        for (let line of lines) {
            if (/[一-龥]/.test(line)) { currentCn = line.replace(/^(中文|中|CN|cn)[:：]/, '').trim(); } 
            else if (/[a-zA-Z]/.test(line) && currentCn) {
                let enText = line.replace(/^(英文|英|EN|en)[:：]/, '').trim();
                let pureEn = enText.replace(/\[\[\[(.*?)\]\]\]/g, "$1");
                let fillText = enText.replace(/\[\[\[(.*?)\]\]\]/g, (match, word) => {
                    let cleanWord = word.trim(); let rawLower = cleanWord.toLowerCase().replace(/[.,!?]$/, '');
                    if (rawLower.split(/\s+/).every(w => noHintWords.has(w))) return `{${cleanWord}}`; 
                    else return `{${cleanWord}} (${getPhraseBaseForm(rawLower)})`; 
                });
                if(fillText === enText) fillText = `{${pureEn}}`;
                newItems.push({ id: startId++, cn: currentCn, en: pureEn, fill: fillText }); currentCn = ''; 
            }
        }
        if(newItems.length > 0) {
            if (mode === 'new') {
                const nameInput = document.getElementById('new-set-name').value.trim();
                const setName = nameInput || `套题 ${new Date().toLocaleDateString()}`;
                const newSetId = Date.now();
                appData.sets.push({ id: newSetId, name: setName, questions: newItems });
                appData.activeSetId = newSetId;
                database = newItems;
                alert(`🎉 成功创建新套题 [${setName}] 并导入 ${newItems.length} 个句子！`);
            } else {
                database = [...database, ...newItems];
                alert(`🎉 成功追加导入 ${newItems.length} 个句子！`);
            }
            await saveToCloud();
            switchTab('fill', document.querySelectorAll('.tab-btn')[2]); 
        } else { alert("⚠️ 未能解析到有效格式，请检查。\n格式要求：一行中文，紧跟一行英文（可加下划线）。"); }
    }

    async function clearDatabase() {
        if(confirm("🚨 确定清空当前套题的所有题目吗？操作不可逆！")) {
            database = []; 
            await saveToCloud(); 
            renderManagePanel();
        }
    }

    function handleSearch(e) { searchQuery = e.target.value.toLowerCase(); currentPage = 1; renderDataTable(); }
    function changePage(delta) { currentPage += delta; renderDataTable(); }
    async function deleteItem(id) {
        if(confirm("确定删除该句子吗？")) {
            database = database.filter(d => d.id !== id); removeMistake(id);
            await saveToCloud(); renderDataTable(); 
        }
    }

    function renderDataTable() {
        let filtered = database.filter(d => d.cn.toLowerCase().includes(searchQuery) || d.en.toLowerCase().includes(searchQuery));
        let totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        let start = (currentPage - 1) * itemsPerPage; let pageData = filtered.slice(start, start + itemsPerPage);

        let tHtml = `<table class="data-table"><thead><tr><th style="width:40%">中文</th><th style="width:40%">英文</th><th style="width:20%">操作</th></tr></thead><tbody>`;
        if (pageData.length === 0) tHtml += `<tr><td colspan="3" style="text-align:center;">暂无匹配数据</td></tr>`;
        pageData.forEach(item => {
            tHtml += `<tr><td>${escapeHtml(item.cn)}</td><td>${escapeHtml(item.en)}</td><td><button class="action-btn" style="background:var(--error); padding:6px 12px; font-size:0.9em;" onclick="deleteItem(${item.id})">删除</button></td></tr>`;
        });
        tHtml += `</tbody></table>`;
        tHtml += `<div class="pagination">
            <button class="page-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            <span style="font-size:0.95em; color:var(--text-light);">第 ${currentPage} / ${totalPages} 页</span>
            <button class="page-btn" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
        </div>`;
        document.getElementById('table-container').innerHTML = tHtml;
    }

    // 系统启动加载
    window.onload = initApp;

</script>
</body>
</html>
